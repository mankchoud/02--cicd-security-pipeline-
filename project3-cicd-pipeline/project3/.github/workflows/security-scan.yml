###############################################################################
# security-scan.yml — Main Security Scanning Workflow
#
# Runs on every push and pull request to main and develop.
# All five security check types run here: secrets, SAST, dependencies,
# IaC, and a summary gate.
#
# FREE-TIER SUBSTITUTIONS:
#
#   ORIGINAL                        FREE-TIER SUBSTITUTE           COST SAVED
#   ──────────────────────────────  ─────────────────────────────  ──────────────
#   GitHub Advanced Security        Gitleaks + Semgrep OSS         ~$19/user/mo
#   SonarQube Cloud                 Semgrep OSS                    ~$15/mo+
#   Snyk (team tier)                pip-audit + npm audit          ~$25/user/mo
#   AWS CodePipeline                This GitHub Actions file       ~$1/pipeline/mo
#   AWS CodeBuild                   GitHub-hosted runners          $0.005/build-min
#
# PRODUCTION EQUIVALENTS (documented for reference, not used here):
#   - AWS CodePipeline + CodeBuild for fully AWS-native CI/CD
#   - GitHub Advanced Security for native secret scanning + code scanning
#   - Amazon Inspector v2 for EC2/container vulnerability scanning
#   - AWS Security Hub to centralise all findings in one place
#
# NET COST: $0
#   GitHub Actions: 2,000 min/mo free on private repos,
#                   unlimited minutes on public repos.
###############################################################################

name: Security Scan

on:
  push:
    branches: ["main", "develop"]
  pull_request:
    branches: ["main", "develop"]

# Least-privilege permissions — only what each job actually needs
permissions:
  contents: read         # checkout repo code
  pull-requests: write   # post findings as PR comments
  security-events: write # upload SARIF to GitHub Security tab

jobs:

  ###############################################################################
  # STEP 2 (of the pipeline flow): Secret Scanning
  #
  # Tool:    Gitleaks (open source — https://github.com/gitleaks/gitleaks)
  # When:    Every push and every PR — full git history is scanned
  # Detects: AWS access keys, GitHub tokens, private keys, passwords,
  #          generic API keys, database connection strings, JWT tokens
  # Block:   YES — any detected secret = exit code 1 = PR blocked
  #
  # PRODUCTION EQUIVALENT: GitHub Advanced Security secret scanning
  #   Differences vs this free-tier build:
  #   - GHAS scans entire history automatically without configuration
  #   - GHAS has push protection (blocks the push before it even lands)
  #   - GHAS supports custom patterns for internal token formats
  #   Cost: ~$19/user/month (included in GitHub Enterprise)
  ###############################################################################
  secret-scan:
    name: "Step 2 - Secret Scanning (Gitleaks)"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Full history — Gitleaks needs all commits

      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        # Exit code 1 = secrets found -> job fails -> PR is blocked.
        # To allowlist known false positives, add a .gitleaks.toml file:
        #   [allowlist]
        #   paths = ["tests/fixtures/dummy-creds.txt"]
        #   commits = ["abc1234"]  # historical commit that has been rotated

  ###############################################################################
  # STEP 3 (of the pipeline flow): Static Analysis — SAST
  #
  # Tool:    Semgrep OSS (open source — https://semgrep.dev)
  # When:    Every PR — needs: secret-scan (only runs if no secrets found)
  # Rules:   p/security-audit, p/python, p/javascript, p/terraform, p/secrets
  # Block:   ERROR severity (HIGH/CRITICAL findings)
  # Warn:    WARNING severity — pipeline continues, finding is reported
  #
  # PRODUCTION EQUIVALENT: SonarQube Cloud or GitHub CodeQL (GHAS)
  #   Differences vs this free-tier build:
  #   - CodeQL does deep dataflow/taint analysis across function call chains
  #   - SonarQube adds quality gates, technical debt, and historic trend tracking
  #   - Both integrate with IDE plugins so developers see findings locally
  ###############################################################################
  sast-scan:
    name: "Step 3 - SAST (Semgrep OSS)"
    runs-on: ubuntu-latest
    needs: secret-scan  # Only run SAST if no secrets were found first
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run Semgrep OSS
        uses: semgrep/semgrep-action@v1
        with:
          config: >-
            p/security-audit
            p/python
            p/javascript
            p/terraform
            p/secrets
          # p/security-audit  = OWASP Top 10 patterns (SQLi, XSS, RCE, etc.)
          # p/python          = Python injection, unsafe deserialization
          # p/javascript      = JS/Node.js prototype pollution, SSRF, etc.
          # p/terraform       = Terraform misconfigs — directly scans Project 2
          # p/secrets         = second layer of secret detection after Gitleaks
          generateSarif: "1"
        env:
          SEMGREP_APP_TOKEN: ""  # Empty = OSS mode, no Semgrep account needed

      - name: Upload SARIF to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v3
        if: always()  # Upload even when Semgrep found issues
        with:
          sarif_file: semgrep.sarif
        # Findings appear inline on the PR diff in the Security -> Code scanning tab

  ###############################################################################
  # STEP 4 (of the pipeline flow): Dependency Scanning
  #
  # Tools:   pip-audit (Python), npm audit (Node.js)
  # When:    Every PR — needs: secret-scan
  # Sources: pip-audit queries PyPA Advisory DB + OSV (Open Source Vulnerabilities)
  # Block:   CRITICAL CVEs with no available fix (parsed by scan-results-parser.sh)
  # Warn:    HIGH CVEs where a fix exists (developer should update the package)
  #
  # PRODUCTION EQUIVALENT: Snyk, OWASP Dependency-Check, or GitHub Dependabot
  #   Differences vs this free-tier build:
  #   - Snyk provides CVSS scores and automatically opens fix PRs
  #   - OWASP Dependency-Check integrates with Maven, Gradle, .NET, Ruby, Go
  #   - Dependabot (free on GitHub) opens automated update PRs
  ###############################################################################
  dependency-scan:
    name: "Step 4 - Dependency Scanning (pip-audit + npm audit)"
    runs-on: ubuntu-latest
    needs: secret-scan
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install pip-audit
        run: pip install pip-audit

      - name: Scan Python dependencies
        run: |
          if [ -f requirements.txt ]; then
            echo "Scanning requirements.txt..."
            pip-audit -r requirements.txt --format json --output pip-audit-results.json || true
            bash scripts/scan-results-parser.sh pip-audit-results.json python
          else
            echo "No requirements.txt found - skipping Python dependency scan"
            echo '{"dependencies":[]}' > pip-audit-results.json
          fi

      - name: Scan Node.js dependencies
        run: |
          if [ -f package.json ]; then
            echo "Scanning package.json..."
            # --audit-level=critical: only exit non-zero on CRITICAL
            # HIGH and below are reported as warnings (pipeline continues)
            npm audit --audit-level=critical --json > npm-audit-results.json || EXIT=$?
            if [ "${EXIT:-0}" = "1" ]; then
              echo "CRITICAL npm vulnerabilities found - blocking PR"
              cat npm-audit-results.json
              exit 1
            fi
          else
            echo "No package.json found - skipping npm audit"
          fi

      - name: Upload scan artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: dependency-scan-results
          path: |
            pip-audit-results.json
            npm-audit-results.json
          retention-days: 30

  ###############################################################################
  # STEP 5 (of the pipeline flow): IaC Scanning
  #
  # Tool:    Checkov (open source — https://www.checkov.io)
  # When:    Every PR — needs: secret-scan
  # Scans:   All Terraform files — directly connects to Project 2
  # Block:   MEDIUM/HIGH/CRITICAL failed checks
  #          (see policies/checkov-config/checkov.yaml for the skip list
  #           — every skipped check has a documented reason and prod note)
  #
  # PRODUCTION EQUIVALENT: Checkov + tfsec + Terraform Sentinel
  #   Differences vs this free-tier build:
  #   - tfsec runs as a second-opinion scanner (different rule set)
  #   - Sentinel enforces mandatory policies in Terraform Cloud/Enterprise
  #   - terraform-check.yml (second workflow) adds tfsec + fmt + validate
  ###############################################################################
  iac-scan:
    name: "Step 5 - IaC Scanning (Checkov)"
    runs-on: ubuntu-latest
    needs: secret-scan
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Checkov
        run: pip install checkov

      - name: Run Checkov on Terraform
        run: |
          checkov \
            --directory . \
            --framework terraform \
            --config-file policies/checkov-config/checkov.yaml \
            --output sarif \
            --output-file-path checkov-results.sarif \
            --soft-fail false
        continue-on-error: true  # Allow next step to always upload SARIF

      - name: Upload Checkov SARIF
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: checkov-results.sarif

      - name: Enforce Checkov result
        # Second run without SARIF to get the blocking exit code
        run: |
          checkov \
            --directory . \
            --framework terraform \
            --config-file policies/checkov-config/checkov.yaml \
            --quiet \
            --soft-fail false

  ###############################################################################
  # Security Summary Gate
  #
  # Runs after all checks complete (success or failure).
  # Posts a pass/fail table to the GitHub Actions summary page.
  #
  # FREE-TIER: GitHub Actions job summaries are built-in and free.
  #
  # PRODUCTION EQUIVALENT:
  #   - AWS Security Hub for centralised findings aggregation across accounts
  #   - Slack alerts to #security-alerts channel on any failure
  #   - Jira ticket auto-created for CRITICAL findings
  ###############################################################################
  security-summary:
    name: "Security Summary"
    runs-on: ubuntu-latest
    needs: [secret-scan, sast-scan, dependency-scan, iac-scan]
    if: always()  # Run even when upstream jobs failed
    steps:
      - name: Post summary
        run: |
          echo "## Security Scan Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Check | Tool | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| Secret Scanning  | Gitleaks OSS  | ${{ needs.secret-scan.result == 'success' && '✅ Passed' || '❌ Failed' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| SAST             | Semgrep OSS   | ${{ needs.sast-scan.result == 'success' && '✅ Passed' || needs.sast-scan.result == 'skipped' && '⏭️ Skipped' || '❌ Failed' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Dependency Scan  | pip-audit     | ${{ needs.dependency-scan.result == 'success' && '✅ Passed' || needs.dependency-scan.result == 'skipped' && '⏭️ Skipped' || '❌ Failed' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| IaC Scan         | Checkov OSS   | ${{ needs.iac-scan.result == 'success' && '✅ Passed' || needs.iac-scan.result == 'skipped' && '⏭️ Skipped' || '❌ Failed' }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "_Full findings: Security tab above. Blocked? See \`docs/escalation-process.md\`_" >> $GITHUB_STEP_SUMMARY
