###############################################################################
# no-hardcoded-credentials.yaml — Custom Semgrep SAST Rules
#
# These rules run alongside the community rule sets (p/security-audit etc.)
# Add organisation-specific patterns here.
#
# Free rule registry: https://semgrep.dev/r
###############################################################################

rules:

  ###############################################################################
  # RULE 1: Hardcoded AWS Access Key
  ###############################################################################
  - id: hardcoded-aws-access-key
    patterns:
      - pattern: $X = "AKIA..."
      - pattern: $X = "ASIA..."
    message: >
      Hardcoded AWS Access Key detected in $X.
      Access keys must never be stored in source code.
      Use IAM roles, environment variables, or AWS Secrets Manager instead.
    languages: [python, javascript, typescript, go, java]
    severity: ERROR
    metadata:
      category: security
      cwe: "CWE-798: Use of Hard-coded Credentials"

  ###############################################################################
  # RULE 2: SQL Injection via String Concatenation
  ###############################################################################
  - id: sql-injection-string-concat
    patterns:
      - pattern: $Q = "SELECT " + $INPUT
      - pattern: $Q = "INSERT " + $INPUT
      - pattern: $Q = f"SELECT ... {$INPUT}..."
    message: >
      Potential SQL injection: query built by string concatenation.
      Use parameterised queries instead.
      Python example: cursor.execute("SELECT * FROM t WHERE id=%s", (uid,))
    languages: [python, javascript, java]
    severity: ERROR
    metadata:
      category: security
      cwe: "CWE-89: SQL Injection"
      owasp: "A03:2021 - Injection"

  ###############################################################################
  # RULE 3: subprocess with shell=True (command injection risk)
  ###############################################################################
  - id: subprocess-shell-true
    pattern: subprocess.run(..., shell=True, ...)
    message: >
      subprocess.run with shell=True is a command injection risk when any
      argument is user-controlled. Pass a list and use shell=False.
      Example: subprocess.run(["ls", "-la"], shell=False)
    languages: [python]
    severity: WARNING
    metadata:
      category: security
      cwe: "CWE-78: OS Command Injection"

  ###############################################################################
  # RULE 4: Flask debug mode enabled
  ###############################################################################
  - id: flask-debug-true
    pattern: app.run(..., debug=True, ...)
    message: >
      Flask debug=True must never reach production.
      The Werkzeug debugger allows arbitrary code execution.
    languages: [python]
    severity: ERROR
    metadata:
      category: security
      cwe: "CWE-94: Code Injection"
